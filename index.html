<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naveen Academy - Maths Online Test</title>
    <style>
        :root { --p: #1a5276; --s: #27ae60; --a: #e74c3c; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        #login-screen, #result-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; border-top: 8px solid var(--p); }
        .instructions { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; text-align: left; margin-bottom: 20px; font-size: 13px; color: #856404; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: var(--s); color: white; border: none; padding: 15px; cursor: pointer; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 10px; }
        .btn:disabled { background: #ccc; cursor: not-allowed; opacity: 0.7; }
        #test-screen { display: none; padding: 20px; }
        .header-bar { position: fixed; top: 0; left: 0; width: 100%; background: var(--p); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; box-sizing: border-box; }
        .timer-badge { background: var(--a); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .series-badge { background: white; color: var(--p); padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        .q-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 10px; border-left: 6px solid var(--p); max-width: 800px; margin: 0 auto 20px auto; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .opt-label { border: 2px solid #eee; padding: 12px; border-radius: 8px; cursor: pointer; display: block; text-align: center; transition: 0.2s; }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .opt-label { background: #e8f5e9; border-color: var(--s); font-weight: bold; }
        #lock-msg { color: var(--a); font-size: 13px; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color:var(--p); margin:0;">NAVEEN ACADEMY</h1>
        <p>कक्षा 9 गणित | BODMAS परीक्षा</p>
        <div class="instructions">
            <strong>नियम:</strong>
            <ul>
                <li>नाम CAPITAL LETTERS में लिखें।</li>
                <li><b>60 मिनट</b> से पहले सबमिट नहीं होगा।</li>
                <li>कुल प्रश्न: 50 | समय: 90 मिनट</li>
            </ul>
        </div>
        <input type="text" id="name" placeholder="Name (जैसे: SURESH JYANI)">
        <input type="number" id="roll" placeholder="Roll No (901-941 या 1000)">
        <button class="btn" onclick="checkAndStart()">टेस्ट शुरू करें</button>
    </div>
</div>

<div id="test-screen">
    <div class="header-bar">
        <div class="series-badge" id="display-series">Series: -</div>
        <div class="timer-badge" id="timer">90:00</div>
    </div>
    <div id="q-container" style="margin-top: 80px;"></div>
    <div style="max-width: 800px; margin: 30px auto; text-align: center; padding-bottom: 50px;">
        <button id="submit-btn" class="btn" style="background:var(--a);" onclick="submitTest()" disabled>सबमिट करें</button>
        <div id="lock-msg">60 मिनट बाद बटन चालू होगा</div>
    </div>
</div>

<div id="result-screen" style="display:none;">
    <div class="login-box">
        <h2>आपका परिणाम</h2>
        <div style="font-size: 50px; color: var(--s); margin: 20px 0;" id="final-score">0/50</div>
        <button class="btn" onclick="location.reload()">Back</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/library/d/1SHTOC-QW2Eyt6gbHu4w13TbPb-P5CFsNM09Pa5bY9filo3cDPfvnKgZo/2"; 
    const validStudents = { 901: "ARCHANA", 902: "AYUSH", 903: "AMRIT", 904: "ANIL", 905: "ARPITA", 906: "ASHOK", 907: "BHAWNA", 908: "DIPIKA", 909: "GAJRA", 910: "GAURAV J", 911: "GAURAV", 912: "GOVIND SUDHAR", 913: "HARISH", 914: "IMARTI", 915: "KAMLESH", 916: "KHUSHWANT", 917: "LAL CHAND", 918: "LEKHRAJ", 919: "MAMTA", 920: "LAXMI", 921: "MANISH", 922: "MANISHA", 923: "MEENAKSHI", 924: "MONIKA", 925: "NARPAT", 926: "PUJA", 927: "PRAKASH", 928: "PRAMILA", 929: "PUKHRAJ", 930: "RAVINDRA", 931: "ROSHAN", 932: "SANGEETA", 933: "SAPNA", 934: "SATYAPAL", 935: "SEEMA", 936: "SNEHA", 937: "SUMAN", 938: "SURESH", 939: "THAKRAM 1", 940: "WALARAM", 941: "VINOD", 1000: "SURESH JYANI" };

    const originalData = [
        {q: "45 + 15 ÷ 3 × 2", a: "55", b: "40", c: "50", d: "60", ans: "55"},
        {q: "100 - (20 + 30) ÷ 2", a: "75", b: "25", c: "50", d: "90", ans: "75"},
        {q: "12 × 5 + (18 ÷ 6)", a: "63", b: "60", c: "70", d: "55", ans: "63"},
        {q: "72 ÷ 8 × (5 + 4)", a: "81", b: "9", c: "72", d: "18", ans: "81"},
        {q: "50 - 5 × 5 + 5", a: "30", b: "0", c: "50", d: "230", ans: "30"},
        {q: "15 + 4 × 5 - 10", a: "25", b: "85", c: "15", d: "20", ans: "25"},
        {q: "(25 + 5) ÷ (10 - 4)", a: "5", b: "10", c: "15", d: "2", ans: "5"},
        {q: "40 ÷ 5 × 2 + 5", a: "21", b: "9", c: "13", d: "10", ans: "21"},
        {q: "120 ÷ 10 - 2 × 3", a: "6", b: "30", c: "10", d: "18", ans: "6"},
        {q: "9 + 9 ÷ 9 + 9 × 9 - 9", a: "82", b: "10", c: "90", d: "81", ans: "82"},
        {q: "30 - [15 - (6 - 3)]", a: "18", b: "12", c: "27", d: "15", ans: "18"},
        {q: "14 + 3 × (10 - 2)", a: "38", b: "136", c: "112", d: "50", ans: "38"},
        {q: "88 ÷ 11 × 2 + 4", a: "20", b: "8", c: "16", d: "12", ans: "20"},
        {q: "(18 + 12) ÷ 5 × 3", a: "18", b: "2", c: "10", d: "6", ans: "18"},
        {q: "60 ÷ (5 × 4) + 12", a: "15", b: "24", c: "14", d: "18", ans: "15"},
        {q: "15 × 4 - 30 ÷ 5", a: "54", b: "6", c: "50", d: "55", ans: "54"},
        {q: "100 ÷ (25 - 5) × 2", a: "10", b: "1", c: "20", d: "5", ans: "10"},
        {q: "7 × 8 + 12 ÷ 4", a: "59", b: "20", c: "56", d: "60", ans: "59"},
        {q: "(40 - 10) + 5 × 6", a: "60", b: "180", c: "45", d: "90", ans: "60"},
        {q: "24 ÷ 3 + 2 × 5", a: "18", b: "50", c: "14", d: "20", ans: "18"},
        {q: "16 + 4 × 4 - 4", a: "28", b: "16", c: "20", d: "64", ans: "28"},
        {q: "(50 - 10) ÷ 8 + 15", a: "20", b: "10", c: "5", d: "25", ans: "20"},
        {q: "12 × 12 ÷ 12 + 12", a: "24", b: "1", c: "144", d: "12", ans: "24"},
        {q: "90 ÷ 3 - (5 × 4)", a: "10", b: "20", c: "25", d: "5", ans: "10"},
        {q: "150 ÷ [10 + (25 - 15)]", a: "7.5", b: "15", c: "10", d: "5", ans: "7.5"},
        {q: "50 ÷ 2 + (20 × 4) ÷ 2", a: "65", b: "45", c: "105", d: "25", ans: "65"},
        {q: "[48 ÷ {12 - (9 - 7)}] × 3", a: "14.4", b: "12", c: "144", d: "10", ans: "14.4"},
        {q: "100 - {20 + (15 ÷ 3) × 4}", a: "60", b: "80", c: "40", d: "50", ans: "60"},
        {q: "(18 × 4) ÷ 12 + 5 × 3", a: "21", b: "18", c: "24", d: "15", ans: "21"},
        {q: "250 ÷ 50 × 5 + (10 - 2)", a: "33", b: "25", c: "17", d: "10", ans: "33"},
        {q: "{45 - (18 ÷ 2)} ÷ 4 + 10", a: "19", b: "15", c: "9", d: "20", ans: "19"},
        {q: "5 × 20 + {15 - (10 ÷ 2)}", a: "110", b: "105", c: "100", d: "95", ans: "110"},
        {q: "[{(10 + 5) × 2} ÷ 3] + 4", a: "14", b: "10", c: "18", d: "20", ans: "14"},
        {q: "120 ÷ [30 - {15 - 5}]", a: "6", b: "4", c: "10", d: "12", ans: "6"},
        {q: "(40 ÷ 4) + (20 ÷ 2)", a: "20", b: "10", c: "15", d: "40", ans: "20"},
        {q: "80 - [20 + {15 - 3}]", a: "48", b: "50", c: "60", d: "72", ans: "48"},
        {q: "{(100 ÷ 4) × 2} - 40", a: "10", b: "50", c: "20", d: "100", ans: "10"},
        {q: "15 + {20 - (5 × 2)} ÷ 2", a: "20", b: "17.5", c: "15", d: "25", ans: "20"},
        {q: "[80 ÷ (16 ÷ 2)] + 10 × 2", a: "30", b: "25", c: "40", d: "50", ans: "30"},
        {q: "500 ÷ [5 × {10 + 10}]", a: "5", b: "10", c: "50", d: "2", ans: "5"},
        {q: "(24 ÷ 8) × 10 - (5 + 5)", a: "20", b: "30", c: "10", d: "0", ans: "20"},
        {q: "[15 + {10 - (8 ÷ 4)}] × 2", a: "46", b: "23", c: "30", d: "40", ans: "46"},
        {q: "10 × 5 ÷ 2 + (15 - 5)", a: "35", b: "25", c: "45", d: "15", ans: "35"},
        {q: "44 + [12 - {6 + 4}]", a: "46", b: "50", c: "44", d: "56", ans: "46"},
        {q: "{100 - (10 × 5)} ÷ 5 + 10", a: "20", b: "10", c: "30", d: "25", ans: "20"},
        {q: "(12 × 6) ÷ (18 ÷ 3) + 4", a: "16", b: "12", c: "8", d: "20", ans: "16"},
        {q: "[50 - {20 + 5}] ÷ 5", a: "5", b: "10", c: "15", d: "2", ans: "5"},
        {q: "16 × 4 + (100 ÷ 10) × 2", a: "84", b: "64", c: "74", d: "100", ans: "84"},
        {q: "{(20 + 10) ÷ 5} × 8 - 10", a: "38", b: "48", c: "58", d: "28", ans: "38"},
        {q: "200 ÷ [2 × {20 + 30}]", a: "2", b: "10", c: "5", d: "20", ans: "2"}
    ];

    let userData = {};
    let timeLeft = 90 * 60;
    let timerId;

    // Same Shuffle logic as your Print code
    function seededRandom(seed) {
        var x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }
    function seededShuffle(array, seed) {
        let m = array.length, t, i;
        while (m) {
            i = Math.floor(seededRandom(seed++) * m--);
            t = array[m]; array[m] = array[i]; array[i] = t;
        }
        return array;
    }

    function checkAndStart() {
        const name = document.getElementById('name').value.trim().toUpperCase();
        const roll = parseInt(document.getElementById('roll').value);
        if(!name || !roll || !validStudents[roll] || validStudents[roll] !== name) return alert("नाम या रोल नंबर गलत है!");

        userData = { name, roll, series: ['D','A','B','C'][roll % 4] };
        document.getElementById('display-series').innerText = "Series: " + userData.series;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('test-screen').style.display = 'block';
        
        renderQuestions();
        startTimer();
    }

    function renderQuestions() {
        const seeds = { 'A': 100, 'B': 200, 'C': 300, 'D': 400 };
        const currentSeed = seeds[userData.series];
        
        // Exact same shuffle as Print Series
        let shuffledQuestions = seededShuffle([...originalData], currentSeed);
        const container = document.getElementById('q-container');
        
        shuffledQuestions.forEach((item, idx) => {
            // Options shuffle also matches print logic
            let opts = [{v: item.a}, {v: item.b}, {v: item.c}, {v: item.d}];
            opts = seededShuffle(opts, currentSeed + idx);

            container.innerHTML += `
                <div class="q-card">
                    <b>Q${idx + 1}.</b> ${item.q}
                    <div class="options-grid">
                        ${opts.map(o => `
                            <label>
                                <input type="radio" name="q${idx}" value="${o.v}" data-ans="${item.ans}">
                                <div class="opt-label">${o.v}</div>
                            </label>
                        `).join('')}
                    </div>
                </div>`;
        });
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            let m = Math.floor(timeLeft/60), s = timeLeft%60;
            document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
            if (timeLeft <= 30 * 60) {
                document.getElementById('submit-btn').disabled = false;
                document.getElementById('lock-msg').style.display = 'none';
            }
            if(timeLeft <= 0) submitTest();
        }, 1000);
    }

    function submitTest() {
        clearInterval(timerId);
        let score = 0;
        document.querySelectorAll('.q-card').forEach(card => {
            let sel = card.querySelector('input:checked');
            if(sel && sel.value === sel.getAttribute('data-ans')) score++;
        });
        fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({...userData, score}) });
        document.getElementById('test-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'flex';
        document.getElementById('final-score').innerText = `${score}/50`;
    }
</script>
</body>
</html>
